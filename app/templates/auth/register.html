{% extends "base.html" %}
{% block title %}注册用户 - 云智实训{% endblock %}
{% block content %}
<div class="container mt-4">
    <h3>注册新用户</h3>
    <div class="form-card">
        <form method="post">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required minlength="3">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirm_password" class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="real_name" class="form-label">真实姓名</label>
                <input type="text" class="form-control" id="real_name" name="real_name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">手机号</label>
                <input type="text" class="form-control" id="phone" name="phone">
            </div>
            <div class="mb-3">
                <label for="role_id" class="form-label">角色</label>
                <select class="form-select" id="role_id" name="role_id" required>
                    <option value="">请选择角色</option>
                    {% for r in roles %}
                    <option value="{{ r.id }}">{{ r.display_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">创建用户</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">返回</a>
        </form>
    </div>
</div>
{% endblock %}
