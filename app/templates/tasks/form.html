{% extends "base.html" %}
{% block title %}{{ '编辑' if task else '创建' }}任务{% endblock %}
{% block content %}
<div class="container mt-4">
    <h3>{{ '编辑' if task else '创建' }}任务</h3>
    <form method="post">
        <div class="row">
            <div class="col-md-8 mb-3">
                <label for="title" class="form-label">任务标题</label>
                <input type="text" class="form-control" id="title" name="title" value="{{ task.title if task else '' }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="project_id" class="form-label">所属项目</label>
                <select class="form-select" id="project_id" name="project_id" required>
                    {% for p in projects %}
                    <option value="{{ p.id }}" {{ 'selected' if task and task.project_id == p.id }}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">任务描述</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ task.description if task else '' }}</textarea>
        </div>
        <div class="row">
            <div class="col-md-3 mb-3">
                <label for="assignee_id" class="form-label">负责人</label>
                <select class="form-select" id="assignee_id" name="assignee_id">
                    <option value="">选择负责人</option>
                    {% for u in users %}
                    <option value="{{ u.id }}" {{ 'selected' if task and task.assignee_id == u.id }}>{{ u.real_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label for="team_id" class="form-label">所属小组</label>
                <select class="form-select" id="team_id" name="team_id">
                    <option value="">选择小组</option>
                    {% for t in teams %}
                    <option value="{{ t.id }}" {{ 'selected' if task and task.team_id == t.id }}>{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 mb-3">
                <label for="priority" class="form-label">优先级</label>
                <select class="form-select" id="priority" name="priority">
                    {% for k, v in task_priorities.items() %}
                    <option value="{{ k }}" {{ 'selected' if task and task.priority == k }}>{{ v }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 mb-3">
                <label for="status" class="form-label">状态</label>
                <select class="form-select" id="status" name="status">
                    {% for k, v in task_statuses.items() %}
                    <option value="{{ k }}" {{ 'selected' if task and task.status == k }}>{{ v }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 mb-3">
                <label for="estimated_hours" class="form-label">预计工时(h)</label>
                <input type="number" class="form-control" id="estimated_hours" name="estimated_hours" step="0.5" value="{{ task.estimated_hours if task else '' }}">
            </div>
        </div>
        {% if task %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="actual_hours" class="form-label">实际工时(h)</label>
                <input type="number" class="form-control" id="actual_hours" name="actual_hours" step="0.5" value="{{ task.actual_hours if task else '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="completion_note" class="form-label">完成说明</label>
                <textarea class="form-control" id="completion_note" name="completion_note" rows="2">{{ task.completion_note if task else '' }}</textarea>
            </div>
        </div>
        {% endif %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="start_date" class="form-label">开始日期</label>
                <input type="date" class="form-control" id="start_date" name="start_date" value="{{ task.start_date if task else '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="due_date" class="form-label">截止日期</label>
                <input type="date" class="form-control" id="due_date" name="due_date" value="{{ task.due_date if task else '' }}">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('task.board') }}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
