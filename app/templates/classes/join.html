{% extends "base.html" %}
{% block title %}加入班级{% endblock %}
{% block page_title_bar %}加入班级{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('dashboard.index') }}">首页</a> <span>/</span> <a href="{{ url_for('class.list_classes') }}">班级</a> <span>/</span> 加入{% endblock %}

{% block content %}
<div class="form-card" style="max-width:440px;">
    <div class="text-center mb-3">
        <i class="bi bi-people-fill" style="font-size:3rem;color:var(--accent);"></i>
        <h5 class="mt-2">输入邀请码加入班级</h5>
        <p class="text-muted small">请向教师索取班级邀请码</p>
    </div>
    <form method="post">
        <div class="mb-3">
            <label for="invite_code" class="form-label">邀请码</label>
            <input type="text" class="form-control form-control-lg text-center" id="invite_code" name="invite_code"
                   placeholder="输入6位邀请码" maxlength="6" required
                   style="font-size:1.4rem;letter-spacing:4px;text-transform:uppercase;">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">加入班级</button>
        <a href="{{ url_for('class.list_classes') }}" class="btn btn-secondary w-100 mt-2">返回</a>
    </form>
</div>
{% endblock %}
